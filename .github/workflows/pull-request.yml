name: Pull Request Gates

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  ASTRO_TELEMETRY_DISABLED: "1"

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          node-version-file: .node-version

      - name: Validate Conventional Commit pull request title
        env:
          CSV_VALIDATOR_COMMIT_SUBJECT: ${{ github.event.pull_request.title }}
        run: node scripts/check-pr-title.mjs

  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: low
          fail-on-scopes: runtime, development, unknown
          vulnerability-check: true
          warn-only: false

  quality:
    name: Preflight
    runs-on: ubuntu-latest
    needs: [validate-pr-title, dependency-review]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          cache: npm
          node-version-file: .node-version

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Preflight
        run: npm run preflight

      - name: Check whitespace
        run: git diff --check
