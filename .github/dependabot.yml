version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 1
    rebase-strategy: "disabled"
    labels:
      - dependencies
      - tooling
    groups:
      github-actions-rollup:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:10"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 1
    rebase-strategy: "disabled"
    labels:
      - dependencies
      - tooling
    groups:
      npm-rollup:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "lighthouse"
        versions:
          - "12.7.0"
          - "12.7.1"
          - "12.8.0"
          - "12.8.1"
          - "12.8.2"
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
